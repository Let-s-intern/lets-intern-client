name: 웹 검사

# apps/web 또는 공용 패키지·모노레포 루트 설정 변경 시만 실행.
# PR: pr-checks (smoke build), main push: main-checks (production build + artifact)
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
      - '.prettierrc.mjs'
      - '.github/workflows/build-web.yml'
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: build-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: web PR 검사 (smoke)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: '1) Prettier check (web 한정) — 차단'
        run: pnpm exec prettier --check "apps/web/**/*.{ts,tsx,js,jsx,json,md}"

      - name: '2) ESLint (web) — 비차단'
        continue-on-error: true
        run: pnpm --filter @letscareer/web lint

      - name: '3) Typecheck (web) — 차단'
        run: pnpm --filter @letscareer/web typecheck

      - name: '4) Build smoke (web, turbopack) — 차단'
        run: pnpm --filter @letscareer/web build
        env:
          NEXT_PUBLIC_SERVER_API: ${{ secrets.NEXT_PUBLIC_SERVER_API || 'https://api.example.com/v1' }}
          NEXT_PUBLIC_SERVER_API_V2: ${{ secrets.NEXT_PUBLIC_SERVER_API_V2 || 'https://api.example.com/v2' }}
          NEXT_PUBLIC_SERVER_API_V3: ${{ secrets.NEXT_PUBLIC_SERVER_API_V3 || 'https://api.example.com/v3' }}
          NEXT_PUBLIC_API_BASE_PATH: ${{ secrets.NEXT_PUBLIC_API_BASE_PATH || 'https://api.example.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.letscareer.co.kr' }}

  main-checks:
    name: web main 검사 + production build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: '1) Prettier check (web 한정) — 차단'
        run: pnpm exec prettier --check "apps/web/**/*.{ts,tsx,js,jsx,json,md}"

      - name: '2) ESLint (web) — 비차단'
        continue-on-error: true
        run: pnpm --filter @letscareer/web lint

      - name: '3) Typecheck (web) — 차단'
        run: pnpm --filter @letscareer/web typecheck

      - name: '4) Build production (web, turbopack) — 차단'
        run: pnpm --filter @letscareer/web build
        env:
          NEXT_PUBLIC_SERVER_API: ${{ secrets.NEXT_PUBLIC_SERVER_API || 'https://api.example.com/v1' }}
          NEXT_PUBLIC_SERVER_API_V2: ${{ secrets.NEXT_PUBLIC_SERVER_API_V2 || 'https://api.example.com/v2' }}
          NEXT_PUBLIC_SERVER_API_V3: ${{ secrets.NEXT_PUBLIC_SERVER_API_V3 || 'https://api.example.com/v3' }}
          NEXT_PUBLIC_API_BASE_PATH: ${{ secrets.NEXT_PUBLIC_API_BASE_PATH || 'https://api.example.com' }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.letscareer.co.kr' }}

      - name: 'Upload web build artifact'
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: web-build-${{ github.sha }}
          path: apps/web/.next
          if-no-files-found: ignore
          retention-days: 7
