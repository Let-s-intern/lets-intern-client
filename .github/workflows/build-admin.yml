name: 어드민 검사

# apps/admin 또는 공용 패키지·모노레포 루트 설정 변경 시만 실행.
# PR: pr-checks (smoke build), main push: main-checks (production build + artifact)
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
      - '.prettierrc.mjs'
      - '.github/workflows/build-admin.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

concurrency:
  group: build-admin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-checks:
    name: admin PR 검사
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm exec prettier --check "apps/admin/**/*.{ts,tsx,js,jsx,json,md}"

      - name: ESLint
        run: pnpm --filter @letscareer/admin lint

      - name: Typecheck
        run: pnpm --filter @letscareer/admin typecheck

      - name: Build (vite)
        run: pnpm --filter @letscareer/admin build
        env:
          VITE_SERVER_API: ${{ secrets.VITE_SERVER_API || 'https://api.example.com/v1' }}
          VITE_SERVER_API_V2: ${{ secrets.VITE_SERVER_API_V2 || 'https://api.example.com/v2' }}
          VITE_SERVER_API_V3: ${{ secrets.VITE_SERVER_API_V3 || 'https://api.example.com/v3' }}
          VITE_API_BASE_PATH: ${{ secrets.VITE_API_BASE_PATH || 'https://api.example.com' }}

  main-checks:
    name: admin main 검사 + production build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm exec prettier --check "apps/admin/**/*.{ts,tsx,js,jsx,json,md}"

      - name: ESLint
        run: pnpm --filter @letscareer/admin lint

      - name: Typecheck
        run: pnpm --filter @letscareer/admin typecheck

      - name: Build (vite)
        run: pnpm --filter @letscareer/admin build
        env:
          VITE_SERVER_API: ${{ secrets.VITE_SERVER_API || 'https://api.example.com/v1' }}
          VITE_SERVER_API_V2: ${{ secrets.VITE_SERVER_API_V2 || 'https://api.example.com/v2' }}
          VITE_SERVER_API_V3: ${{ secrets.VITE_SERVER_API_V3 || 'https://api.example.com/v3' }}
          VITE_API_BASE_PATH: ${{ secrets.VITE_API_BASE_PATH || 'https://api.example.com' }}

      - name: Upload admin build artifact
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: admin-build-${{ github.sha }}
          path: apps/admin/dist
          if-no-files-found: ignore
          retention-days: 7
