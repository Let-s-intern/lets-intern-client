name: Build admin

# apps/admin 또는 공용 패키지·모노레포 루트 설정 변경 시만 실행.
# .claude/**, .cursor/**, *.md 같은 메타 파일 수정은 트리거되지 않는다.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'
      - '.github/workflows/build-admin.yml'
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'turbo.json'
      - 'package.json'

jobs:
  build:
    name: Build admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build:admin
        env:
          VITE_API_BASE_PATH: ${{ secrets.VITE_API_BASE_PATH || 'https://api.example.com' }}
          VITE_SERVER_API: ${{ secrets.VITE_SERVER_API || 'https://api.example.com/api/v1' }}
