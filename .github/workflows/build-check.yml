# Security note: untrusted input (issue/PR title 등) 사용하지 않음 → 안전한 stub.

name: Build Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Pass
        run: echo "임시 stub — branch protection 호환용. 실제 빌드는 어드민/멘토/웹 검사 워크플로 참조."
