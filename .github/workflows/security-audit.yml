# ============================================================
# 패키지 보안검사 — 의존성 취약점 감사(pnpm audit)
# ============================================================
# 설치한 패키지와 그 하위(전이) 의존성까지 알려진 보안 취약점이 있는지
# 검사한다. 공유 pnpm-lock.yaml 전체를 검사하므로 path 필터 없이 모든
# PR에서 실행한다.
#
# ▶ 현재 단계: report-only (머지 차단 안 함, branch protection 비필수)
#   critical 취약점이 있어도 통과시키고 결과만 출력한다. 안정화 후
#   아래 audit 스텝의 `|| true` 를 제거하면 critical 발견 시 빨간불이 되고,
#   필요 시 GitHub Settings → Branches 에서 '패키지 보안검사'를 필수 체크로
#   추가하면 머지 차단 게이트가 된다.
# ============================================================
# Security note: untrusted input(issue/PR title 등) 사용하지 않음 → 안전.

name: 패키지 보안검사

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  audit:
    name: 패키지 보안검사
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # pnpm audit 은 pnpm-lock.yaml 만 읽으므로 `pnpm install` 불필요.
      # TODO(차단 모드 전환): 안정화 후 `|| true` 제거.
      - name: pnpm audit (critical, report-only)
        run: |
          echo "::group::pnpm audit (critical, prod deps)"
          pnpm audit --audit-level critical --prod --ignore-registry-errors || true
          echo "::endgroup::"
          echo "ℹ️ 현재 report-only 모드입니다. 안정화 후 차단 모드로 전환 예정."
